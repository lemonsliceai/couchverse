<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch with Fox</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <h1>Watch with <em>Fox &amp; Alien</em></h1>
      <div id="status" class="status-dot disconnected">
        <span class="dot"></span>
        <span id="status-text">Offline</span>
      </div>
    </header>

    <!-- Setup screen (shown before session starts).
         Mirrors the session screen: status bar at top, stacked 2:3
         portraits in the middle, controls panel at the bottom. The
         portraits visually "become" the live avatars once connected,
         so setup → session reads as the same space animating to life. -->
    <div id="setup-screen">
      <div id="setup-status">
        <span class="status-icon">&#x1F3AC;</span>
        <span id="video-title" class="status-mood">Detecting video...</span>
      </div>

      <div id="cast-stack">
        <div class="cast-portrait">
          <img src="icons/fox_2x3.jpg" alt="Fox" />
          <div class="cast-badge-wrap"><span>Fox</span></div>
        </div>
        <div class="cast-portrait">
          <img src="icons/alien_2x3.jpg" alt="Alien" />
          <div class="cast-badge-wrap"><span>Alien</span></div>
        </div>
      </div>

      <div id="setup-controls">
        <button id="start-btn" class="btn-primary" disabled>
          Watch with Fox &amp; Alien
        </button>
        <div id="settings-row">
          <label>
            API URL
            <input id="api-url" type="text" spellcheck="false" />
          </label>
        </div>
        <p id="setup-error" class="error hidden"></p>
      </div>
    </div>

    <!-- Session screen (shown after connection) -->
    <div id="session-screen" class="hidden">

      <!-- Status Bar — game HUD element -->
      <div id="fox-status">
        <span class="status-icon" id="fox-status-icon">&#x1F98A;</span>
        <span class="status-label" id="status-speaker">The Couch</span>
        <span class="status-mood" id="fox-mood">Joining...</span>
      </div>

      <!-- Two stacked avatar slots — populated dynamically when each
           lemonslice-avatar-<name> participant connects. The data-name
           attribute is the persona name; sidepanel.js routes tracks +
           speaker-state by matching it.

           Each slot shows a still preview (icons/*_2x3.jpg) until the
           LiveKit video track attaches, at which point the live avatar
           fades in over the preview. Keeps the panel visually populated
           during the ~1-2s avatar boot instead of showing dead space. -->
      <div id="avatars-stack">
        <div class="avatar-slot has-preview" data-name="default" data-label="Fox">
          <img class="avatar-preview" src="icons/fox_2x3.jpg" alt="Fox" />
          <div class="avatar-video"></div>
          <div class="avatar-badge">
            <span>Fox</span>
          </div>
          <div class="reactions"></div>
          <div class="captions"></div>
        </div>

        <div class="avatar-slot has-preview" data-name="chaos_agent" data-label="Alien">
          <img class="avatar-preview" src="icons/alien_2x3.jpg" alt="Alien" />
          <div class="avatar-video"></div>
          <div class="avatar-badge">
            <span>Alien</span>
          </div>
          <div class="reactions"></div>
          <div class="captions"></div>
        </div>
      </div>

      <!-- Audio renderer — hidden elements for the comedians' voices -->
      <div id="audio-container" class="hidden"></div>

      <!-- Controls — Game HUD Panel -->
      <div id="controls">
        <div class="control-actions">
          <button id="end-btn" class="btn-end">End</button>
        </div>
      </div>
    </div>
  </div>

  <script src="dist/sidepanel.js"></script>
</body>
</html>
